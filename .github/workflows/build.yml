name: Build Android APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # AGP 8.3.2 requires JDK 17. Using Temurin (Eclipse Adoptium) which is
  # the standard on GitHub-hosted runners.
  JAVA_VERSION: '17'
  # Pin Flutter to a known-good stable version that supports the
  # dependencies declared in pubspec.yaml (Dart SDK >=3.3.0).
  # flutter_code_editor 0.3.2 requires Flutter >=3.19.
  FLUTTER_VERSION: '3.24.5'
  # Must match android/gradle/wrapper/gradle-wrapper.properties
  GRADLE_VERSION: '8.6'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ─── Source ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          # Cache Maven/Gradle metadata fetched by the JVM toolchain resolver.
          cache: gradle

      # ─── Flutter ──────────────────────────────────────────────────────────
      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}

      - name: Verify Flutter installation
        run: flutter --version

      # ─── Android local.properties ─────────────────────────────────────────
      # Must be created BEFORE any Gradle invocation.
      # android/settings.gradle reads this file at configuration time to
      # locate Flutter's Gradle plugin via includeBuild(...).
      - name: Create android/local.properties
        run: |
          FLUTTER_ROOT=$(dirname "$(dirname "$(which flutter)")")
          {
            echo "flutter.sdk=${FLUTTER_ROOT}"
            echo "sdk.dir=${ANDROID_SDK_ROOT}"
          } > android/local.properties
          echo "=== android/local.properties ==="
          cat android/local.properties

      # ─── Gradle wrapper bootstrap ─────────────────────────────────────────
      # The repository is missing gradle-wrapper.jar because it was never
      # committed (the .gitignore omits the JAR by default in many templates).
      # We download the matching Gradle binary distribution, run
      # `gradle wrapper` which generates the JAR + re-writes the properties,
      # and then discard the downloaded distro — the wrapper itself will
      # re-download the distribution if needed during the actual build.
      - name: Cache Gradle distribution download
        id: gradle-dist-cache
        uses: actions/cache@v4
        with:
          path: /tmp/gradle-dist
          key: gradle-dist-${{ env.GRADLE_VERSION }}

      - name: Download Gradle ${{ env.GRADLE_VERSION }} distribution
        if: steps.gradle-dist-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip" \
            -o /tmp/gradle-dist.zip
          mkdir -p /tmp/gradle-dist
          unzip -q /tmp/gradle-dist.zip -d /tmp/gradle-dist
          echo "Gradle binary available:"
          ls /tmp/gradle-dist/gradle-${{ env.GRADLE_VERSION }}/bin/

      - name: Generate gradle-wrapper.jar
        run: |
          GRADLE_BIN="/tmp/gradle-dist/gradle-${{ env.GRADLE_VERSION }}/bin/gradle"

          # Run `gradle wrapper` inside android/ so that settings.gradle
          # (and its local.properties lookup) resolves correctly.
          cd android
          "${GRADLE_BIN}" wrapper \
            --gradle-version "${{ env.GRADLE_VERSION }}" \
            --distribution-type bin \
            --no-daemon
          chmod +x gradlew

          echo "=== gradle/wrapper/ after generation ==="
          ls -lh gradle/wrapper/

      # ─── Pub / Dart dependencies ──────────────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install Flutter dependencies
        run: flutter pub get

      # ─── Static analysis ──────────────────────────────────────────────────
      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos

      # ─── Tests ────────────────────────────────────────────────────────────
      - name: Run unit tests
        run: flutter test

      # ─── Build ────────────────────────────────────────────────────────────
      # Build the debug APK. This variant uses the debug signing config
      # (generated automatically on the runner), so no keystore setup is
      # required. Add a separate job or step for a signed release APK once
      # you have a keystore secret configured in the repo.
      - name: Build debug APK
        run: flutter build apk --debug --verbose

      # Build the unsigned release APK too, so the workflow exercises the
      # same `flutter build apk --release` path required for a production
      # build. It uses the debug signing config (see android/app/build.gradle)
      # until a real release keystore is configured per SETUP.md.
      - name: Build release APK
        run: flutter build apk --release --verbose

      # ─── Artifact upload ──────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: codeforge-debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: codeforge-release-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
