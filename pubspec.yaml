name: codeforge
description: "CodeForge — a professional mobile code editor with integrated AI assistance."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State management ──────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Storage & persistence ─────────────────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── File system access ────────────────────────────────────────────────
  file_picker: ^8.0.7
  permission_handler: ^11.3.1

  # ── Code editor & syntax highlighting ────────────────────────────────
  flutter_code_editor: ^0.3.2
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # ── Networking (AI) ───────────────────────────────────────────────────
  http: ^1.2.1

  # ── Fonts ─────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Utilities ─────────────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
